syntax = "proto3";
package order;
option go_package = "./protobuf;protobuf";

message Periodical {
  int64 id = 1;
  int64 nkr = 2;
  string type = 3;
  string title = 4;
  string number = 5;
  string index = 6;
  string data_responsibility = 7;
  string language = 8;
  int64 year_count = 9;
  string industry = 10;
  string place_edition = 11;
  string publishing = 12;
  string year_edition = 13;
}
syntax = "proto3";
package order;
option go_package = "./protobuf;protobuf";
import "google/protobuf/timestamp.proto";
import "protobuf/model_ebook.proto";
import "protobuf/model_reader.proto";
import "protobuf/model_periodical.proto";
import "protobuf/model_dictionary.proto";
message Order {
  int64 Id = 1;
  google.protobuf.Timestamp created_at = 2;
  google.protobuf.Timestamp updated_at = 3;
  string type = 4;
  Reader reader = 5;
  Ebook ebook = 6;
  EbookInv inv_number = 7;
  Periodical periodical = 8;
  State state = 9;
  Department department = 10;
  bool is_auxiliary_fund = 11;
}
message StateCount {
  State state = 1;
  int64 total = 2;
}
message Paging {
  int64   offset = 1;
  int64   limit = 2;
  string  sortKey = 3;
  int32   sortVal = 4;
}
message OrderFilters {
  int64 ebook_id = 1;
  int64 periodical_id = 2;
  int64 ticket_number = 3;
  repeated string states = 4;
  int64 department_id = 5;
  string period = 6;
  int64 is_auxiliary_fund = 7;
  string query = 8;
}
message StateCountFilters {
  repeated string states = 1;
  int64 department_id = 2;
  string period = 3;
}
message IssueOrder {
  int64 id = 1;
  int64 ebook_inv_id = 2;
}
message User {
  int64 id = 1;
  string name = 2;
  string username = 3;
  string email = 4;
  string state  = 5;
  Department department = 6;
}
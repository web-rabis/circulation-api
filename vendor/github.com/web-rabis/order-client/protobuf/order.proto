syntax = "proto3";
package order;
option go_package = "./protobuf;protobuf";
import "protobuf/model_order.proto";
import "protobuf/model_dictionary.proto";
import "google/protobuf/empty.proto";


service OrderService {
  rpc List(OrderListRequest) returns (OrderListResponse) {}
  rpc ById(ByIdRequest) returns (Order) {}
  rpc Reject(RejectRequest) returns (google.protobuf.Empty) {}
  rpc CancelReject(CancelRejectRequest) returns (google.protobuf.Empty) {}
  rpc Redirect(RedirectRequest) returns (google.protobuf.Empty) {}
  rpc Postponed(PostponedRequest) returns (google.protobuf.Empty) {}
  rpc Return(ReturnRequest) returns (google.protobuf.Empty) {}
  rpc Issue(IssueRequest) returns (google.protobuf.Empty) {}
  rpc Archive(ArchiveRequest) returns (google.protobuf.Empty) {}
  rpc SendToPf(SendToPfRequest) returns (google.protobuf.Empty) {}
  rpc ReturnToStorage(ReturnToStorageRequest) returns (google.protobuf.Empty) {}
  rpc StateCounts(StateCountsRequest) returns (StateCountsResponse) {}
}

service DictionaryService {
  rpc ReasonRejectionList(ReasonRejectionListRequest) returns (ReasonRejectionListResponse) {}
  rpc ReasonRejectionById(ByIdRequest) returns (ReasonRejection) {}
  rpc DepartmentList(DepartmentListRequest) returns (DepartmentListResponse) {}
  rpc DepartmentById(ByIdRequest) returns (Department) {}
}


message OrderListRequest {
  OrderFilters filters = 1;
  Paging paging = 2;
}
message OrderListResponse {
  int64 count = 1;
  repeated Order orders = 2;
}
message ByIdRequest {
  int64 id = 1;
}
message RejectRequest {
  repeated int64 ids = 1;
  int64 reason_rejection_id = 2;
  User user = 3;
}
message RedirectRequest{
  repeated int64 ids = 1;
  int64 department_id = 2;
  User user = 3;
}
message CancelRejectRequest {
  repeated int64 ids = 1;
  User user = 3;
}
message PostponedRequest {
  repeated int64 ids = 1;
  User user = 3;
}
message ReturnRequest {
  repeated int64 ids = 1;
  User user = 3;
}
message IssueRequest {
  repeated IssueOrder ids = 1;
  User user = 3;
}
message ArchiveRequest {
  repeated int64 ids = 1;
  User user = 3;
}
message SendToPfRequest {
  repeated int64 ids = 1;
  User user = 3;
}
message ReturnToStorageRequest {
  repeated int64 ids = 1;
  User user = 3;
}
message StateCountsRequest{
  StateCountFilters filters = 1;
}
message StateCountsResponse{
  repeated StateCount state_counts = 1;
}
message ReasonRejectionListRequest {
  ReasonRejectionFilters filters = 1;
  Paging paging = 2;
}
message ReasonRejectionListResponse {
  int64 count = 1;
  repeated ReasonRejection reason_rejections = 2;
}
message DepartmentListRequest {
  DepartmentFilters filters = 1;
  Paging paging = 2;
}
message DepartmentListResponse {
  int64 count = 1;
  repeated Department departments = 2;
}

syntax = "proto3";
package ebook;
option go_package = "./protobuf;protobuf";
import "protobuf/dictionary_model.proto";

message EbookBrief {
    int64 id = 1;
    int64 parent_id = 2;
    BibliographicLevel bibliographic_level = 3;
    TypeDescription type_description = 4;
    bool krv = 5;
    Catalog catalog = 6;
    string author = 7;
    string title = 8;
    repeated Source sources = 9;
    repeated ServiceNote service_notes = 10;
    AuthorMark author_mark = 11;
    string r_cipher = 12;

}
message EbookCard{
    int64 volume_number = 1;
    string author = 2;
    string title = 3;
    string r_avt = 4;
    string main = 5;
    string r_cipher = 6;
    AuthorMark author_mark = 7;
    Language language = 8;
    repeated string indexes = 9;
    repeated Inv inv = 10;
}
message AuthorMark {
  string author_mark = 1;
}
message ServiceNote {
  int64 id = 1;
  int64 ebook_id = 2;
  DictionaryServiceData service_data = 3;
}
message Inv {
  int64 id = 1;
  int64 ebook_id = 2;
  string inv_number = 3;
  string barcode = 4;
  Department department = 5;
  State state = 6;
}
message Source {
  int64 id = 1;
  int64 ebook_id = 2;
  string title = 3;
  string data = 4;
  string responsibility = 5;
  string authors = 6;
  string data_edition = 7;
  string data_out = 8;
  string special_character = 9;
  string composite_information = 10;
  string series = 11;
  string isbn = 12;
  string issn = 13;
  string parallel_name = 14;
  string year = 15;
  string pages = 16;
}
message Language {
  int64 id = 1;
  int64 ebook_id = 2;
  DictionaryLanguage language = 3;
  string source_rewrite = 4;
}
message Paging {
  int64   offset = 1;
  int64   limit = 2;
  string  sortKey = 3;
  int32   sortVal = 4;
}
message InvFilters {
  int64 ebook_id = 1;
}